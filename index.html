
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>GOMALL | Creator Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Montserrat:wght@400;700;900&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Bebas+Neue&family=Oswald:wght@400;700&family=Cinzel:wght@400;700;900&family=Permanent+Marker&family=JetBrains+Mono:wght@400;800&family=Lora:ital,wght@0,400;0,700;1,400&family=Anton&family=Dancing+Script:wght@400;700&family=Pacifico&family=Ubuntu:wght@400;700&family=Roboto:wght@400;700&family=Open+Sans:wght@400;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F8F9FA;
            color: #1A1A1A;
            margin: 0;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        #root {
            height: 100%;
            overflow: hidden;
        }

        /* RESET PARA EXPORTACIÓN */
        .is-exporting-mode .no-export {
            display: none !important;
            visibility: hidden !important;
            opacity: 0 !important;
        }

        .is-exporting-mode * {
            transition: none !important;
            animation: none !important;
            box-shadow: none !important;
        }

        .is-exporting-container {
            border-radius: 0 !important;
            box-shadow: none !important;
            border: none !important;
            transform: none !important;
            background-color: white !important;
        }

        .is-exporting-container * {
            animation: none !important;
        }

        @media screen and (max-width: 768px) {
            input, select, textarea {
                font-size: 16px !important;
            }
        }
    </style>
<script type="importmap">

  }
}
</script>
