
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>GOMALL | Creator Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Calistoga&family=Inter:wght@300;400;500;600;700;800;900&family=Montserrat:wght@400;700;900&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Bebas+Neue&family=Oswald:wght@400;700&family=Cinzel:wght@400;700;900&family=Permanent+Marker&family=JetBrains+Mono:wght@400;800&family=Lora:ital,wght@0,400;0,700;1,400&family=Anton&family=Dancing+Script:wght@400;700&family=Pacifico&family=Ubuntu:wght@400;700&family=Roboto:wght@400;700&family=Open+Sans:wght@400;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #F8F9FA;
            color: #1A1A1A;
            margin: 0;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        /* Fuente de títulos (display) — acabado premium */
        .font-display {
            font-family: 'Calistoga', 'Inter', serif;
            letter-spacing: -0.01em;
        }

        /* === Controles premium (color pickers + sliders) === */
        /* Color picker: el color llena toda la caja redondeada, sin el marco gris nativo */
        input[type="color"] {
            -webkit-appearance: none;
            appearance: none;
            padding: 0;
            cursor: pointer;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: inherit; }
        input[type="color"]::-moz-color-swatch { border: none; border-radius: inherit; }

        /* Sliders: thumb blanco con anillo naranja de marca + micro-interacción */
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 9999px;
            background: #ffffff;
            border: 3px solid #EA5B25;
            box-shadow: 0 2px 5px rgba(15, 23, 42, 0.2);
            margin-top: -5px;
            cursor: pointer;
            transition: transform 0.15s ease;
        }
        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.18); }
        input[type="range"]::-webkit-slider-thumb:active { transform: scale(1.05); }
        input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 9999px;
            background: #ffffff;
            border: 3px solid #EA5B25;
            box-shadow: 0 2px 5px rgba(15, 23, 42, 0.2);
            cursor: pointer;
        }
        select { cursor: pointer; }
        @media (prefers-reduced-motion: reduce) {
            input[type="range"]::-webkit-slider-thumb { transition: none; }
        }

        #root {
            height: 100%;
            overflow: hidden;
        }

        /* RESET PARA EXPORTACIÓN */
        .is-exporting-mode .no-export {
            display: none !important;
            visibility: hidden !important;
            opacity: 0 !important;
        }

        .is-exporting-mode * {
            transition: none !important;
            animation: none !important;
            box-shadow: none !important;
        }

        .is-exporting-container {
            border-radius: 0 !important;
            box-shadow: none !important;
            border: none !important;
            transform: none !important;
            background-color: white !important;
        }

        .is-exporting-container * {
            animation: none !important;
        }

        @media screen and (max-width: 768px) {
            input, select, textarea {
                font-size: 16px !important;
            }
        }
    </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "react": "https://esm.sh/react@^19.0.0",
    "react-dom": "https://esm.sh/react-dom@^19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@^19.0.0/client",
    "html-to-image": "https://esm.sh/html-to-image@^1.11.11",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "vite": "https://esm.sh/vite@^7.3.0",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "firebase/": "https://esm.sh/firebase@^12.7.0/"
  }
}
</script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
